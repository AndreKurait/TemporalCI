# OpenSearch Migrations k8s integ test — replaces Jenkins pipeline
# Deploys a fresh MA stack via helm, runs migration tests, tears down
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    labels: [run-k8s-e2e]

parameters:
  - name: SOURCE_VERSION
    type: choice
    default: "ES_7.10"
    options: ["ES_7.10", "ES_6.8", "ES_5.6", "ES_2.4", "ES_1.5"]
    description: "Source Elasticsearch version"
  - name: TARGET_VERSION
    type: choice
    default: "OS_2.19"
    options: ["OS_2.19", "OS_1.3", "OS_3.1"]
    description: "Target OpenSearch version"
  - name: TEST_IDS
    type: string
    default: "0001"
    description: "Comma-separated test IDs to run"
  - name: DEPLOY_FRESH_CLUSTER
    type: boolean
    default: "false"
    description: "Deploy a new EKS cluster via CloudFormation (slow, ~20min)"

steps:
  # Option A: Full bootstrap — creates EKS cluster + all infra via CFN
  - name: bootstrap-eks
    when: "$DEPLOY_FRESH_CLUSTER == 'true'"
    image: temporalci/ci-base:opensearch-migrations
    aws_role:
      role_arn_secret: EKS_BOOTSTRAP_ROLE_ARN
    timeout: 30m
    command: |
      set -ex
      cd /tmp/opensearch-migrations
      STACK_NAME="ci-migration-${TEMPORALCI_SHA:0:8}"
      deployment/k8s/aws/aws-bootstrap.sh \
        --region us-east-2 \
        --stage ci \
        --deploy-create-vpc \
        --namespace ma
      echo "$STACK_NAME" > /artifacts/stack-name.txt
    secrets: [EKS_BOOTSTRAP_ROLE_ARN]
    artifacts:
      upload:
        - path: /artifacts/stack-name.txt

  # Option B (default): Use shared test cluster, fresh namespace per run
  - name: configure-cluster
    when: "$DEPLOY_FRESH_CLUSTER != 'true'"
    image: temporalci/ci-base:opensearch-migrations
    aws_role:
      role_arn_secret: EKS_TEST_ROLE_ARN
    timeout: 5m
    command: |
      set -ex
      aws eks update-kubeconfig \
        --name migration-eks-cluster-prod-us-east-2 \
        --region us-east-2
      kubectl get nodes
    secrets: [EKS_TEST_ROLE_ARN]

  # Run the migration integ test (helm installs fresh MA stack, runs test, cleans up)
  - name: migration-integ-test
    image: temporalci/ci-base:opensearch-migrations
    depends_on: [bootstrap-eks, configure-cluster]
    aws_role:
      role_arn_secret: EKS_TEST_ROLE_ARN
    lock: migration-test-cluster
    lock_timeout: 30m
    timeout: 45m
    command: |
      set -ex
      cd /tmp/opensearch-migrations

      # testAutomation without --skip-install:
      #   1. Deletes 'ma' namespace if it exists
      #   2. Creates fresh 'ma' namespace
      #   3. Helm installs the MA chart
      #   4. Runs migration workflow tests
      #   5. Cleans up (unless --skip-delete)
      cd libraries/testAutomation
      pipenv install

      pipenv run app \
        --source-version=$SOURCE_VERSION \
        --target-version=$TARGET_VERSION \
        --test-ids=$TEST_IDS \
        --kube-context="$(kubectl config current-context)" \
        --test-reports-dir=/artifacts/reports

      echo "✅ Migration integ test passed"
    secrets: [EKS_TEST_ROLE_ARN]
    artifacts:
      upload:
        - path: /artifacts/reports/

  - name: all-checks
    type: gate
    depends_on: [migration-integ-test]

post:
  always:
    # Tear down CFN stack if we bootstrapped one
    - name: teardown-eks
      when: "$DEPLOY_FRESH_CLUSTER == 'true'"
      command: |
        STACK_NAME=$(cat /artifacts/stack-name.txt 2>/dev/null || echo "")
        if [ -n "$STACK_NAME" ]; then
          echo "Tearing down CFN stack: $STACK_NAME"
          aws cloudformation delete-stack --stack-name "$STACK_NAME" --region us-east-2
          aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region us-east-2
          echo "✅ Stack deleted"
        fi
  on_failure:
    - name: collect-debug-logs
      command: |
        echo "Collecting debug info..."
        kubectl get pods -n ma -o wide 2>/dev/null || true
        kubectl get workflows -n ma 2>/dev/null || true
        kubectl get events -n ma --sort-by=.lastTimestamp 2>/dev/null | tail -30 || true
