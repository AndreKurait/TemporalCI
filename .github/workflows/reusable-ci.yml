name: Reusable CI Pipeline

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.23'
      test-command:
        description: 'Command to run tests'
        required: false
        type: string
        default: 'go test ./... -v -json'
      build-command:
        description: 'Command to build'
        required: false
        type: string
        default: 'go build ./...'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: ${{ inputs.build-command }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Download dependencies
        run: go mod tidy

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests
        run: |
          gotestsum --junitfile test-results.xml --format testdox -- ./... -v
        continue-on-error: true
        id: tests

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: Test Summary
        if: always()
        run: |
          if [ -f test-results.xml ]; then
            echo "## Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            # Parse JUnit XML for summary
            TESTS=$(grep -c 'testcase' test-results.xml 2>/dev/null || echo "0")
            FAILURES=$(grep -c 'failure' test-results.xml 2>/dev/null || echo "0")
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check test result
        if: steps.tests.outcome == 'failure'
        run: exit 1

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Download dependencies
        run: go mod tidy

      - name: Vet
        run: go vet ./...
