apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporalci
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AndreKurait/TemporalCI.git
    targetRevision: main
    path: deploy/helm
    helm:
      valueFiles:
        - values.yaml
        - values-eks.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: temporalci
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
