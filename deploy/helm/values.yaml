image:
  registry: ""
  repository: temporalci
  tag: latest
  pullPolicy: IfNotPresent

worker:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

webhook:
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

temporal:
  enabled: true
  server:
    config:
      persistence:
        default:
          driver: sql
          sql:
            driver: postgres

postgresql:
  enabled: true
  auth:
    postgresPassword: temporal
    database: temporal

aws:
  region: ""

logs:
  s3Bucket: ""

secrets:
  prefix: temporalci
  local:
    enabled: false
    githubWebhookSecret: ""
    githubToken: ""
  aws:
    enabled: false

rds:
  enabled: false
  instanceClass: db.t4g.micro
  allocatedStorage: 20

s3:
  enabled: false

nodePool:
  system:
    enabled: false
  ciJobs:
    enabled: false

serviceAccounts:
  worker:
    roleArn: ""
  webhook:
    roleArn: ""
  ciJob:
    roleArn: ""
