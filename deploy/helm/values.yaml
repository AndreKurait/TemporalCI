image:
  registry: ""
  repository: temporalci
  tag: latest
  pullPolicy: IfNotPresent

worker:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

webhook:
  replicas: 1
  port: 8080
  loadBalancer:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

temporal:
  enabled: true
  server:

temporalWeb:
  loadBalancer:
    enabled: false
    config:
      persistence:
        default:
          driver: sql
          sql:
            driver: postgres

postgresql:
  enabled: true
  auth:
    postgresPassword: temporal
    database: temporal

secrets:
  prefix: temporalci
  local:
    enabled: false
    githubWebhookSecret: ""
    githubToken: ""
  aws:
    enabled: false

serviceAccounts:
  worker:
    roleArn: ""
  webhook:
    roleArn: ""
  ciJob:
    roleArn: ""

# --- Q1 ---
logs:
  s3Bucket: ""
  awsRegion: ""

ciNodePool:
  enabled: false

cache:
  goModules:
    enabled: false
    storageClass: "efs-sc"
    size: "10Gi"
  artifacts:
    enabled: false
    storageClass: "efs-sc"
    size: "5Gi"

# --- Q2 ---
githubApp:
  enabled: false
  appID: ""

# --- Q3 ---
autoMode:
  enabled: false  # Enable to create NodePool CRDs for Auto Mode

ack:
  rds:
    enabled: false
    instanceClass: "db.t4g.medium"
    allocatedStorage: 20
    subnetGroupName: ""
    multiAZ: false
    masterPassword: ""  # Set via --set
  s3:
    enabled: false
    bucketName: ""

networkPolicy:
  enabled: false

# --- Local dev (LocalStack) ---
localstack:
  enabled: false

aws:
  endpointURL: ""
  accessKeyID: ""
  secretAccessKey: ""

# --- CI Dashboard ---
ciDashboard:
  enabled: false
  replicas: 1
  port: 3000
  publicRead: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

githubOAuth:
  clientId: ""
  clientSecret: ""
  sessionSecret: ""