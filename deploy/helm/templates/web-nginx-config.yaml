apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-web-nginx
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    worker_processes auto;
    events { worker_connections 1024; }
    http {
      include /etc/nginx/mime.types;
      gzip on;
      gzip_types text/plain text/css application/json application/javascript text/xml;
      gzip_min_length 256;
      gzip_comp_level 6;
      gzip_vary on;

      proxy_cache_path /tmp/cache levels=1:2 keys_zone=assets:10m max_size=100m inactive=60m;

      server {
        listen 80;

        # Immutable assets — cache aggressively
        location /_app/immutable/ {
          proxy_pass http://{{ .Release.Name }}-web:8080;
          proxy_cache assets;
          proxy_cache_valid 200 7d;
          add_header Cache-Control "public, max-age=604800, immutable";
          add_header X-Cache-Status $upstream_cache_status;
        }

        # CI Dashboard — pass full path (SvelteKit base=/ci)
        location /ci/ {
          proxy_pass http://{{ .Release.Name }}-ci-dashboard:{{ .Values.ciDashboard.port }}/ci/;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";

          # Rewrite nested _app paths from relative CSS/JS references
          sub_filter_once off;
          sub_filter './_app/' '/ci/_app/';
        }

        # CI API
        location /api/ci/ {
          proxy_pass http://{{ .Release.Name }}-webhook:{{ .Values.webhook.port }};
          proxy_read_timeout 30s;
        }

        # Auth endpoints
        location /auth/ {
          proxy_pass http://{{ .Release.Name }}-webhook:{{ .Values.webhook.port }};
        }

        # API calls — no cache
        location /api/ {
          proxy_pass http://{{ .Release.Name }}-web:8080;
          proxy_read_timeout 30s;
        }

        # Everything else
        location / {
          proxy_pass http://{{ .Release.Name }}-web:8080;
          add_header Cache-Control "no-cache";
        }
      }
    }
