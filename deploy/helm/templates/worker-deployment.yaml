apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ci-worker
  labels:
    {{- include "temporalci.labels" . | nindent 4 }}
    app.kubernetes.io/component: ci-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "temporalci.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ci-worker
  template:
    metadata:
      labels:
        {{- include "temporalci.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ci-worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.registry }}{{ if .Values.image.registry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/worker"]
          env:
            - name: TEMPORAL_HOST_PORT
              value: "{{ .Release.Name }}-temporal-frontend:7233"
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
