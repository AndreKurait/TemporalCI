image:
  registry: "localhost:5000"
  repository: temporalci
  tag: local
  pullPolicy: Always

worker:
  replicas: 1
  temporalWebURL: "http://localhost:8088"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

webhook:
  replicas: 1
  port: 8080
  loadBalancer:
    enabled: false
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

temporalWeb:
  loadBalancer:
    enabled: false

temporal:
  enabled: true
  cassandra:
    enabled: false
  elasticsearch:
    enabled: false
  prometheus:
    enabled: false
  grafana:
    enabled: false
  web:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
  server:
    frontend:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
    history:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
    matching:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    worker:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    config:
      persistence:
        default:
          driver: sql
          sql:
            driver: postgres12
            host: temporalci-postgresql
            port: 5432
            database: temporal
            user: postgres
            password: temporal
        visibility:
          driver: sql
          sql:
            driver: postgres12
            host: temporalci-postgresql
            port: 5432
            database: temporal_visibility
            user: postgres
            password: temporal

postgresql:
  enabled: true
  image:
    tag: latest
  primary:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

secrets:
  local:
    enabled: true
    githubWebhookSecret: "dev-secret"
    githubToken: ""

# LocalStack for S3 + Secrets Manager
localstack:
  enabled: true
  startServices: "s3,secretsmanager"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# S3 logs via LocalStack
logs:
  s3Bucket: "temporalci-logs"
  awsRegion: "us-east-1"

# AWS endpoint override -> LocalStack
aws:
  endpointURL: "http://temporalci-localstack:4566"
  accessKeyID: "test"
  secretAccessKey: "test"

ciNodePool:
  enabled: false
cache:
  goModules:
    enabled: false
  artifacts:
    enabled: false
githubApp:
  enabled: false
autoMode:
  enabled: false
ack:
  rds:
    enabled: false
  s3:
    enabled: false
networkPolicy:
  enabled: false
