# Local development values (minikube/kind)
image:
  registry: ""
  repository: temporalci
  tag: latest
  pullPolicy: Never

worker:
  replicas: 1

webhook:
  replicas: 1

temporal:
  enabled: true

postgresql:
  enabled: true
  auth:
    postgresPassword: temporal
    database: temporal

secrets:
  prefix: temporalci
  local:
    enabled: true
    githubWebhookSecret: dev-secret
    githubToken: ""
  aws:
    enabled: false
