image:
  registry: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com
  tag: 80e9078cd91924c9b36ef1828cfb19b52cc4e029
  pullPolicy: Always

worker:
  replicas: 1
  temporalWebURL: "http://<ELB_HOSTNAME>"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

webhook:
  replicas: 1
  port: 8080
  loadBalancer:
    enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

temporalWeb:
  loadBalancer:
    enabled: true

temporal:
  enabled: true
  cassandra:
    enabled: false
  elasticsearch:
    enabled: false
  prometheus:
    enabled: false
  grafana:
    enabled: false
  web:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  server:
    frontend:
      service:
        port: 7233
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 512Mi
    history:
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 512Mi
    matching:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
    worker:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
    config:
      persistence:
        default:
          driver: sql
          sql:
            driver: postgres12
            host: temporalci-postgresql
            port: 5432
            database: temporal
            user: postgres
            password: temporal
        visibility:
          driver: sql
          sql:
            driver: postgres12
            host: temporalci-postgresql
            port: 5432
            database: temporal_visibility
            user: postgres
            password: temporal

postgresql:
  enabled: true
  primary:
    persistence:
      storageClass: ebs-gp3
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  image:
    registry: public.ecr.aws
    repository: bitnami/postgresql
    tag: 17.2.0-debian-12-r6

global:
  security:
    allowInsecureImages: true

secrets:
  local:
    enabled: true
    githubWebhookSecret: ""  # Set via --set or K8s secret
    githubToken: ""  # Set via --set or K8s secret

# --- Q1: CI node pool + S3 logs ---

logs:
  s3Bucket: ""  # Set via --set logs.s3Bucket=$LOG_BUCKET
  awsRegion: "us-east-1"

ciNodePool:
  enabled: false

cache:
  goModules:
    enabled: false  # Enable when EFS StorageClass is available
    storageClass: "efs-sc"
    size: "10Gi"
  artifacts:
    enabled: false
    storageClass: "efs-sc"
    size: "5Gi"

# --- CI Dashboard ---
ciDashboard:
  enabled: true
  replicas: 1
  port: 3000
  publicRead: true
