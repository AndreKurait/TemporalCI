apiVersion: v2
name: temporalci
description: Kubernetes-native CI system built on Temporal
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: temporal
    version: "0.73.2"
    repository: "https://go.temporal.io/helm-charts"
    condition: temporal.enabled
  - name: postgresql
    version: "16.4.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: localstack
    version: "0.6.18"
    repository: "https://localstack.github.io/helm-charts"
    condition: localstack.enabled
